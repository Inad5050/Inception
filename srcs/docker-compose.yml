services:
  mariadb:
    build:
      context: ./requirements/mariadb
    container_name: mariadb
    volumes:
      - ${DATA_PATH}/db_data:/var/lib/mysql
    networks:
      - inception_network
    restart: unless-stopped
    secrets:
      - db_password
      - db_root_password
    environment:
      MYSQL_DATABASE: ${MYSQL_NAME}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD_FILE: /run/secrets/db_password
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/db_root_password
    healthcheck:
      # Comando que se ejecuta para comprobar la salud.
      # 'mariadb-admin ping' es la herramienta estándar para esto.
      test: ["CMD", "mariadb-admin", "ping", "--silent"]
      interval: 10s   # Comprueba cada 10 segundos.
      timeout: 5s     # Espera 5 segundos por una respuesta.
      retries: 5      # Inténtalo 5 veces antes de marcarlo como 'unhealthy'.
      start_period: 10s # Tiempo de gracia inicial antes de empezar los chequeos.

  wordpress:
    build:
      context: ./requirements/wordpress
    container_name: wordpress
    depends_on:
      mariadb:
        # Condición: no arrancar hasta que el servicio 'mariadb' esté 'healthy'.
        condition: service_healthy
    volumes:
      - ${DATA_PATH}/wp_data:/var/www/html
    networks:
      - inception_network
    restart: unless-stopped
    secrets:
      - db_password
    environment:
      WORDPRESS_DB_NAME: ${MYSQL_NAME}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD_FILE: /run/secrets/db_password
      WORDPRESS_DB_HOST: mariadb:3306
      DOMAIN_NAME: ${DOMAIN_NAME}
    healthcheck:
      # Comprueba si el proceso de PHP-FPM está en ejecución.
      test: ["CMD-SHELL", "ps -ef | grep -q '[p]hp-fpm'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  nginx:
    build:
      context: ./requirements/nginx
    container_name: nginx
    depends_on:
      wordpress:
        # Nginx esperará a que WordPress esté saludable antes de arrancar.
        condition: service_healthy
    ports:
      - "443:443"
    volumes:
      - ${DATA_PATH}/wp_data:/var/www/html
    networks:
      - inception_network
    restart: always
    environment:
      DOMAIN_NAME: ${DOMAIN_NAME}

networks:
  inception_network:
    driver: bridge

secrets:
  db_password:
    file: ../secrets/db_password.txt
  db_root_password:
    file: ../secrets/db_root_password.txt